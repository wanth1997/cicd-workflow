name: Reusable Release Candidate - Go Node

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      go_version_file:
        required: true
        type: string
      go_dependency_file:
        required: true
        type: string
      node_version:
        required: true
        type: string
      frontend_dir:
        required: true
        type: string
      frontend_lockfile:
        required: true
        type: string
      backend_shards_json:
        required: true
        type: string
      backend_ci_command:
        required: true
        type: string
      migration_check_command:
        required: true
        type: string
      frontend_ci_command:
        required: true
        type: string
      build_release_command:
        required: true
        type: string
      release_artifact_prefix:
        required: true
        type: string
      postgres_image:
        required: false
        type: string
        default: postgres:15
      postgres_db:
        required: false
        type: string
        default: app_ci
      postgres_user:
        required: false
        type: string
        default: app
      postgres_password:
        required: false
        type: string
        default: app
      require_clean:
        required: false
        type: string
        default: "1"
      artifact_retention_days:
        required: false
        type: number
        default: 14

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend-full-tests:
    name: backend-full-tests (${{ matrix.shard }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(inputs.backend_shards_json) }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: ${{ inputs.go_version_file }}
          cache: true
          cache-dependency-path: ${{ inputs.go_dependency_file }}

      - name: Download Go modules
        run: go mod download

      - name: Run backend tests
        env:
          BACKEND_TEST_SUITE: ${{ matrix.suite }}
          GO_TEST_JSON: .artifacts/ci/${{ matrix.report }}
        run: ${{ inputs.backend_ci_command }}

      - name: Summarize backend shard
        if: always()
        env:
          BACKEND_TEST_SHARD: ${{ matrix.shard }}
          BACKEND_TEST_SUITE: ${{ matrix.suite }}
          GO_TEST_JSON: .artifacts/ci/${{ matrix.report }}
        run: |
          if [[ ! -f "$GO_TEST_JSON" ]]; then
            echo "### Backend shard: $BACKEND_TEST_SHARD" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "No Go test JSON report was generated." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          import os
          from pathlib import Path

          path = Path(os.environ["GO_TEST_JSON"])
          tests = {}
          packages = set()
          for line in path.read_text(encoding="utf-8").splitlines():
              if not line.strip():
                  continue
              try:
                  event = json.loads(line)
              except json.JSONDecodeError:
                  continue
              package = event.get("Package", "")
              if package:
                  packages.add(package)
              test = event.get("Test")
              action = event.get("Action")
              if test and action in {"pass", "fail", "skip"}:
                  tests[(package, test)] = (action, float(event.get("Elapsed", 0) or 0))

          passed = sum(1 for action, _ in tests.values() if action == "pass")
          failed = sum(1 for action, _ in tests.values() if action == "fail")
          skipped = sum(1 for action, _ in tests.values() if action == "skip")
          slowest = sorted(
              ((elapsed, package, test, action) for (package, test), (action, elapsed) in tests.items()),
              reverse=True,
          )[:10]

          print(f"### Backend shard: {os.environ['BACKEND_TEST_SHARD']}")
          print("")
          print(f"- Suite: `{os.environ['BACKEND_TEST_SUITE']}`")
          print(f"- Packages: `{len(packages)}`")
          print(f"- Tests passed: `{passed}`")
          print(f"- Tests failed: `{failed}`")
          print(f"- Tests skipped: `{skipped}`")
          print("")
          print("| Time | Result | Test |")
          print("| ---: | --- | --- |")
          for seconds, package, test, action in slowest:
              print(f"| {seconds:.2f}s | `{action}` | `{package}.{test}` |")
          PY

      - name: Upload backend Go test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.service_name }}-backend-full-${{ matrix.shard }}-go-test-report
          path: .artifacts/ci/${{ matrix.report }}
          if-no-files-found: ignore
          retention-days: ${{ inputs.artifact_retention_days }}

  backend-migration:
    name: backend-migration
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: ${{ inputs.postgres_image }}
        env:
          POSTGRES_DB: ${{ inputs.postgres_db }}
          POSTGRES_USER: ${{ inputs.postgres_user }}
          POSTGRES_PASSWORD: ${{ inputs.postgres_password }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ${{ inputs.postgres_user }} -d ${{ inputs.postgres_db }}"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://${{ inputs.postgres_user }}:${{ inputs.postgres_password }}@localhost:5432/${{ inputs.postgres_db }}?sslmode=disable
      TEST_DATABASE_URL: postgres://${{ inputs.postgres_user }}:${{ inputs.postgres_password }}@localhost:5432/${{ inputs.postgres_db }}?sslmode=disable
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: ${{ inputs.go_version_file }}
          cache: true
          cache-dependency-path: ${{ inputs.go_dependency_file }}

      - name: Download Go modules
        run: go mod download

      - name: Run migration and schema check
        run: ${{ inputs.migration_check_command }}

  frontend-checks:
    name: frontend-checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm
          cache-dependency-path: ${{ inputs.frontend_lockfile }}

      - name: Run frontend checks
        run: ${{ inputs.frontend_ci_command }}

  build-release:
    name: build-release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - backend-migration
      - frontend-checks
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: ${{ inputs.go_version_file }}
          cache: true
          cache-dependency-path: ${{ inputs.go_dependency_file }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm
          cache-dependency-path: ${{ inputs.frontend_lockfile }}

      - name: Download Go modules
        run: go mod download

      - name: Build release artifact
        id: build
        env:
          REQUIRE_CLEAN: ${{ inputs.require_clean }}
        run: ${{ inputs.build_release_command }}

      - name: Upload release candidate
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.release_artifact_prefix }}${{ steps.build.outputs.release_id }}
          path: ${{ steps.build.outputs.release_dir }}
          if-no-files-found: error
          retention-days: ${{ inputs.artifact_retention_days }}

name: Reusable Release Candidate - Node Python

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      python_version:
        required: true
        type: string
      node_version:
        required: true
        type: string
      backend_dependency_file:
        required: true
        type: string
      frontend_lockfile:
        required: true
        type: string
      run_backend_full_tests:
        required: false
        type: boolean
        default: true
      backend_shards_json:
        required: true
        type: string
      backend_ci_command:
        required: true
        type: string
      migration_check_command:
        required: true
        type: string
      frontend_ci_command:
        required: true
        type: string
      build_release_command:
        required: true
        type: string
      release_artifact_prefix:
        required: true
        type: string
      postgres_image:
        required: false
        type: string
        default: postgres:15
      postgres_db:
        required: false
        type: string
        default: app_ci
      postgres_user:
        required: false
        type: string
        default: app
      postgres_password:
        required: false
        type: string
        default: app
      require_clean:
        required: false
        type: string
        default: "1"
      artifact_retention_days:
        required: false
        type: number
        default: 14
      telegram_chat_id:
        required: false
        type: string
        default: ""
      telegram_notify_on:
        required: false
        type: string
        default: failure
    secrets:
      telegram_bot_token:
        required: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend-full-tests:
    name: backend-full-tests (${{ matrix.shard }})
    if: ${{ inputs.run_backend_full_tests }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(inputs.backend_shards_json) }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python_version }}
          cache: pip
          cache-dependency-path: ${{ inputs.backend_dependency_file }}

      - name: Install backend dependencies
        run: python -m pip install -r "${{ inputs.backend_dependency_file }}"

      - name: Run backend tests
        env:
          BACKEND_TEST_SUITE: ${{ matrix.suite }}
          PYTEST_JUNIT_XML: .artifacts/ci/${{ matrix.report }}
        run: ${{ inputs.backend_ci_command }}

      - name: Summarize backend shard
        if: always()
        env:
          BACKEND_TEST_SHARD: ${{ matrix.shard }}
          BACKEND_TEST_SUITE: ${{ matrix.suite }}
          PYTEST_JUNIT_XML: .artifacts/ci/${{ matrix.report }}
        run: |
          if [[ ! -f "$PYTEST_JUNIT_XML" ]]; then
            echo "### Backend shard: $BACKEND_TEST_SHARD" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "No pytest XML report was generated." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import os
          import xml.etree.ElementTree as ET

          path = os.environ["PYTEST_JUNIT_XML"]
          root = ET.parse(path).getroot()
          cases = list(root.iter("testcase"))
          failures = list(root.iter("failure"))
          errors = list(root.iter("error"))
          skipped = list(root.iter("skipped"))
          total_time = sum(float(case.attrib.get("time", "0") or 0) for case in cases)
          slowest = sorted(
              (
                  (
                      float(case.attrib.get("time", "0") or 0),
                      case.attrib.get("classname", ""),
                      case.attrib.get("name", ""),
                  )
                  for case in cases
              ),
              reverse=True,
          )[:10]

          print(f"### Backend shard: {os.environ['BACKEND_TEST_SHARD']}")
          print("")
          print(f"- Suite: `{os.environ['BACKEND_TEST_SUITE']}`")
          print(f"- Tests: `{len(cases)}`")
          print(f"- Time: `{total_time:.2f}s`")
          print(f"- Failures: `{len(failures)}`")
          print(f"- Errors: `{len(errors)}`")
          print(f"- Skipped: `{len(skipped)}`")
          print("")
          print("| Time | Test |")
          print("| ---: | --- |")
          for seconds, classname, name in slowest:
              test_name = f"{classname}.{name}" if classname else name
              print(f"| {seconds:.2f}s | `{test_name}` |")
          PY

      - name: Upload backend pytest report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.service_name }}-backend-full-${{ matrix.shard }}-pytest-report
          path: .artifacts/ci/${{ matrix.report }}
          if-no-files-found: ignore
          retention-days: ${{ inputs.artifact_retention_days }}

  backend-migration:
    name: backend-migration
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: ${{ inputs.postgres_image }}
        env:
          POSTGRES_DB: ${{ inputs.postgres_db }}
          POSTGRES_USER: ${{ inputs.postgres_user }}
          POSTGRES_PASSWORD: ${{ inputs.postgres_password }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ${{ inputs.postgres_user }} -d ${{ inputs.postgres_db }}"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://${{ inputs.postgres_user }}:${{ inputs.postgres_password }}@localhost:5432/${{ inputs.postgres_db }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python_version }}
          cache: pip
          cache-dependency-path: ${{ inputs.backend_dependency_file }}

      - name: Install backend dependencies
        run: python -m pip install -r "${{ inputs.backend_dependency_file }}"

      - name: Run migration and schema drift check
        run: ${{ inputs.migration_check_command }}

  frontend-checks:
    name: frontend-checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm
          cache-dependency-path: ${{ inputs.frontend_lockfile }}

      - name: Run frontend checks
        run: ${{ inputs.frontend_ci_command }}

  build-release:
    name: build-release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      release_id: ${{ steps.build.outputs.release_id }}
    needs:
      - backend-migration
      - frontend-checks
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python_version }}
          cache: pip
          cache-dependency-path: ${{ inputs.backend_dependency_file }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm
          cache-dependency-path: ${{ inputs.frontend_lockfile }}

      - name: Install backend dependencies
        run: python -m pip install -r "${{ inputs.backend_dependency_file }}"

      - name: Build release artifact
        id: build
        env:
          REQUIRE_CLEAN: ${{ inputs.require_clean }}
        run: ${{ inputs.build_release_command }}

      - name: Upload release candidate
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.release_artifact_prefix }}${{ steps.build.outputs.release_id }}
          path: ${{ steps.build.outputs.release_dir }}
          if-no-files-found: error
          retention-days: ${{ inputs.artifact_retention_days }}

  notify-telegram:
    name: notify-telegram
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: ${{ always() }}
    needs:
      - backend-full-tests
      - backend-migration
      - frontend-checks
      - build-release
    steps:
      - name: Send Telegram notification
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.telegram_bot_token }}
          TELEGRAM_CHAT_ID: ${{ inputs.telegram_chat_id }}
          TELEGRAM_NOTIFY_ON: ${{ inputs.telegram_notify_on }}
          SERVICE_NAME: ${{ inputs.service_name }}
          WORKFLOW_STAGE: Release Candidate
          RELEASE_ID: ${{ needs['build-release'].outputs.release_id }}
          RUN_BACKEND_FULL_TESTS: ${{ inputs.run_backend_full_tests }}
          NEEDS_JSON: ${{ toJson(needs) }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.parse
          import urllib.request

          def one_line(value, limit=140):
              text = " ".join((value or "").strip().split())
              if len(text) > limit:
                  return text[: limit - 3] + "..."
              return text

          def event_payload():
              path = os.environ.get("GITHUB_EVENT_PATH", "")
              if not path:
                  return {}
              try:
                  with open(path, encoding="utf-8") as handle:
                      return json.load(handle)
              except (OSError, json.JSONDecodeError):
                  return {}

          token = os.environ.get("TELEGRAM_BOT_TOKEN", "").strip()
          chat_id = os.environ.get("TELEGRAM_CHAT_ID", "").strip()
          if not token or not chat_id:
              print("Telegram notification disabled: telegram_chat_id or telegram_bot_token is empty.")
              raise SystemExit(0)

          needs = json.loads(os.environ.get("NEEDS_JSON", "{}") or "{}")
          job_results = {
              job_name: job_data.get("result", "unknown")
              for job_name, job_data in needs.items()
          }
          if os.environ.get("RUN_BACKEND_FULL_TESTS", "true").lower() != "true":
              job_results.pop("backend-full-tests", None)
          results = list(job_results.values())
          if any(result == "failure" for result in results):
              status = "failed"
          elif any(result == "cancelled" for result in results):
              status = "cancelled"
          elif results and all(result == "success" for result in results):
              status = "success"
          elif any(result == "skipped" for result in results):
              status = "skipped"
          else:
              status = "unknown"

          notify_on = os.environ.get("TELEGRAM_NOTIFY_ON", "failure").strip().lower()
          if notify_on not in {"always", "failure", "never"}:
              print(f"Unsupported telegram_notify_on={notify_on!r}; using failure.")
              notify_on = "failure"
          should_send = notify_on == "always" or (notify_on == "failure" and status != "success")
          if notify_on == "never" or not should_send:
              print(f"Telegram notification skipped for status={status}.")
              raise SystemExit(0)

          event = event_payload()
          pull_request = event.get("pull_request") or {}
          head_commit = event.get("head_commit") or {}
          workflow_run = event.get("workflow_run") or {}
          workflow_head_commit = workflow_run.get("head_commit") or {}

          repo = os.environ["GITHUB_REPOSITORY"]
          server_url = os.environ.get("GITHUB_SERVER_URL", "https://github.com").rstrip("/")
          run_id = os.environ["GITHUB_RUN_ID"]
          run_url = f"{server_url}/{repo}/actions/runs/{run_id}"
          branch = (
              (pull_request.get("head") or {}).get("ref")
              or os.environ.get("GITHUB_HEAD_REF")
              or os.environ.get("GITHUB_REF_NAME")
              or "unknown"
          )
          target_branch = (
              (pull_request.get("base") or {}).get("ref")
              or os.environ.get("GITHUB_BASE_REF")
              or ""
          )
          branch_line = f"{branch} -> {target_branch}" if target_branch else branch
          commit_sha = (
              (pull_request.get("head") or {}).get("sha")
              or workflow_run.get("head_sha")
              or os.environ.get("GITHUB_SHA", "")
          )
          short_sha = commit_sha[:7] if commit_sha else "unknown"
          commit_title = one_line(
              pull_request.get("title")
              or head_commit.get("message")
              or workflow_head_commit.get("message")
          )
          action = {
              "success": "No action needed.",
              "failed": "Check the failed job in the GitHub Run.",
              "cancelled": "Check whether the cancellation was expected.",
              "skipped": "Check workflow conditions and dependencies.",
          }.get(status, "Check the GitHub Run.")

          lines = [
              f"[{status.upper()}] {os.environ['SERVICE_NAME']} / {os.environ['WORKFLOW_STAGE']}",
              "",
              f"Repo: {repo}",
              f"Stage: {os.environ['WORKFLOW_STAGE']}",
              f"Workflow: {os.environ.get('GITHUB_WORKFLOW', 'unknown')}",
              f"Status: {status}",
              f"Branch: {branch_line}",
          ]
          if pull_request.get("number"):
              pr_title = one_line(pull_request.get("title"))
              lines.append(f"PR: #{pull_request['number']} - {pr_title}")
          if commit_title:
              lines.append(f"Commit: {commit_title} ({short_sha})")
          else:
              lines.append("Commit: not available in event payload")
          release_id = os.environ.get("RELEASE_ID", "").strip()
          if release_id:
              lines.append(f"Release ID: {release_id}")
          lines.extend(
              [
                  f"Actor: {os.environ.get('GITHUB_ACTOR', 'unknown')}",
                  f"Event: {os.environ.get('GITHUB_EVENT_NAME', 'unknown')}",
                  f"Run: #{os.environ.get('GITHUB_RUN_NUMBER', 'unknown')} attempt {os.environ.get('GITHUB_RUN_ATTEMPT', '1')}",
                  "",
                  "Jobs:",
              ]
          )
          for job_name, result in job_results.items():
              lines.append(f"- {job_name}: {result}")
          lines.extend(["", f"Action: {action}", "", "GitHub Run:", run_url])

          payload = urllib.parse.urlencode(
              {
                  "chat_id": chat_id,
                  "text": "\n".join(lines),
                  "disable_web_page_preview": "true",
              }
          ).encode("utf-8")
          request = urllib.request.Request(
              f"https://api.telegram.org/bot{token}/sendMessage",
              data=payload,
              method="POST",
          )
          with urllib.request.urlopen(request, timeout=20) as response:
              response.read()
          print("Telegram notification sent.")
          PY
